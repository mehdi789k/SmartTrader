services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: smarttred-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=change-this-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:3000,http://localhost,http://frontend:3000
    volumes:
      - ./app/logs:/app/app/logs
    networks:
      - smarttred-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend UI
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: smarttred-frontend
    ports:
      - "3000:3000"
    environment:
      - API_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - smarttred-network
    restart: unless-stopped

  # TimescaleDB (PostgreSQL + Timescale)
  timescaledb:
    image: timescale/timescaledb:2.11.0-pg14
    container_name: smarttred-timescaledb
    environment:
      - POSTGRES_USER=smarttred
      - POSTGRES_PASSWORD=smarttredpass
      - POSTGRES_DB=smarttred_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    networks:
      - smarttred-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarttred -d smarttred_db"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  smarttred-network:
    driver: bridge

volumes:
  logs:
    driver: local
  db_data:
    driver: local
